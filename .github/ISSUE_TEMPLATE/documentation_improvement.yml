name: Documentation Improvement
description: Suggest a change to project documentation or onboarding materials.
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Use this template for updates that improve clarity, onboarding, or contributor guidance.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what is unclear, missing, or outdated.
      placeholder: What documentation gap are you trying to close?
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: Explain how the documentation should help after the change.
      placeholder: What should a new contributor understand or do more easily?
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the conditions that should be true when the documentation update is complete.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: checkboxes
    id: interest
    attributes:
      label: Contributor interest
      description: Let maintainers know whether you would like to update the documentation.
      options:
        - label: I am interested in working on this issue.
        - label: I can help review the wording for clarity.