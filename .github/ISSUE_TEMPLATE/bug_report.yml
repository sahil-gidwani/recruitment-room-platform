name: Bug Report
description: Report a problem or unexpected behavior in Recruitment Room.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this template for issues where something does not work as expected.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the bug and what happened.
      placeholder: What happened, and what should have happened instead?
    validations:
      required: true
  - type: textarea
    id: expected_outcome
    attributes:
      label: Expected outcome
      description: Explain the result you expected to see.
      placeholder: What should the application do instead?
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Describe the conditions that would confirm the bug is fixed.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: checkboxes
    id: interest
    attributes:
      label: Contributor interest
      description: Indicate whether you want to help investigate or fix the bug.
      options:
        - label: I am interested in working on this issue.
        - label: I can help test a fix if needed.